
# Server Monitoring Agent Configuration
# This file contains default configuration values
# Override these by setting environment variables or editing monitoring-agent.env

# Basic Configuration
AGENT_ID=monitoring-agent-001
CHECK_INTERVAL=30s
HEALTH_CHECK_PORT=8081

# HTTP REST API (fallback)
SERVER_URL=http://localhost:8080
# API_KEY=your-api-key-here

# PocketBase Configuration
POCKETBASE_ENABLED=true
POCKETBASE_URL=http://localhost:8090

# Remote Control
REMOTE_CONTROL_ENABLED=true
COMMAND_CHECK_INTERVAL=10s

# Monitoring Settings
REPORT_INTERVAL=5m
MAX_RETRIES=3
REQUEST_TIMEOUT=10s

# Containerized deployment (optional)
# If the agent runs inside Docker, bind-mount host root (example: -v /:/hostfs:ro)
# and set MONITORING_DISK_PATH to report host disk capacity instead of container overlay.
# MONITORING_DISK_PATH=/hostfs

# Server Configuration - REQUIRED for proper server registration
# These values should be configured for each server
SERVER_NAME=
HOSTNAME=
IP_ADDRESS=
OS_TYPE=
SERVER_TOKEN=
